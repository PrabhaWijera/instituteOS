app = "instituteos"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://instituteos-api.fly.dev/api"
    NEXT_PUBLIC_WS_URL = "wss://instituteos-api.fly.dev/ws"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
