global:
  resolve_timeout: 5m

route:
  receiver: 'noop'
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h

  routes:
    # Critical alerts - immediate
    - match:
        severity: critical
      receiver: 'noop'
      group_wait: 0s
      repeat_interval: 1h

    # Warning alerts
    - match:
        severity: warning
      receiver: 'noop'
      repeat_interval: 4h

    # Info alerts
    - match:
        severity: info
      receiver: 'noop'
      repeat_interval: 24h

inhibit_rules:
  # Inhibit warning and info if critical is firing
  - source_match:
      severity: 'critical'
    target_match_re:
      severity: 'warning|info'
    equal: ['alertname', 'instance']

  # Inhibit info if warning is firing
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'instance']

receivers:
  # Local/dev default: accept alerts but do not send notifications.
  # Email alerting is handled by Grafana SMTP in this local Compose setup.
  - name: 'noop'
