groups:
  - name: nexclass_alerts
    interval: 30s
    rules:
      # ===== API & Backend Alerts =====
      - alert: BackendServiceDown
        expr: up{job="nexclass-api"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend service is down"
          description: "NexClass API has been unavailable for more than 2 minutes"

      - alert: HighErrorRate
        expr: rate(nexclass_http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High API error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} - {{ .Instance }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(nexclass_http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is {{ $value | humanizeDuration }}"

      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(nexclass_http_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "P99 API latency is very high"
          description: "P99 latency is {{ $value | humanizeDuration }}"

      # ===== Database Alerts =====
      - alert: HighDatabaseConnections
        expr: nexclass_db_pool_connections_current > 20
        for: 3m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database connection pool usage is high"
          description: "Current connections: {{ $value }}/25 ({{ $value | humanizePercentage }})"

      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(nexclass_db_query_duration_seconds_bucket[5m])) > 0.5
        for: 3m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database queries are slow"
          description: "P95 query time: {{ $value | humanizeDuration }}"

      - alert: DatabaseConnectionFailures
        expr: rate(nexclass_db_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection errors detected"
          description: "Connection error rate: {{ $value }} errors/sec"

      # ===== Redis/Cache Alerts =====
      - alert: RedisDown
        expr: nexclass_redis_connected == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis connection lost"
          description: "Cannot reach Redis server - OTP system may be affected"

      - alert: RedisHighMemory
        expr: nexclass_redis_used_memory_bytes / nexclass_redis_max_memory_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage is critical"
          description: "Redis memory: {{ $value | humanizePercentage }} of max"

      # ===== Authentication Alerts =====
      - alert: AuthenticationFailuresSpike
        expr: rate(nexclass_auth_failures_total[5m]) > 1.0
        for: 3m
        labels:
          severity: warning
          service: auth
        annotations:
          summary: "High authentication failure rate"
          description: "Auth failures: {{ $value }} per second"

      - alert: AccountLockoutsSpike
        expr: rate(nexclass_auth_account_lockouts_total[5m]) > 0.5
        for: 3m
        labels:
          severity: warning
          service: auth
        annotations:
          summary: "Multiple account lockouts detected"
          description: "Lockouts: {{ $value }} per second (possible attack)"

      # ===== External API Alerts (Groq, Cloudinary) =====
      - alert: ExternalAPIFailures
        expr: rate(nexclass_external_api_calls_failed_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: external_apis
        annotations:
          summary: "External API failures detected"
          description: "{{ $labels.service }} failure rate: {{ $value | humanizePercentage }}"

      - alert: ExternalAPIHighLatency
        expr: histogram_quantile(0.95, rate(nexclass_external_api_duration_seconds_bucket[5m])) > 5.0
        for: 5m
        labels:
          severity: warning
          service: external_apis
        annotations:
          summary: "External API response time is high"
          description: "{{ $labels.service }} P95 latency: {{ $value | humanizeDuration }}"

      # ===== Attendance System Alerts =====
      - alert: AttendanceSessionFailed
        expr: rate(nexclass_attendance_session_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: attendance
        annotations:
          summary: "Attendance session failures detected"
          description: "Failure rate: {{ $value | humanizePercentage }}"

      - alert: HighOTPExpiryRate
        expr: rate(nexclass_otp_expired_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
          service: attendance
        annotations:
          summary: "High OTP expiry rate - possible network issues"
          description: "OTP expiry rate: {{ $value }} per second"

      - alert: AttendanceMarkingDelay
        expr: histogram_quantile(0.95, rate(nexclass_attendance_marking_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          service: attendance
        annotations:
          summary: "Attendance marking is slow"
          description: "P95 marking time: {{ $value | humanizeDuration }}"

      # ===== Billing & Payment Alerts =====
      - alert: BillingJobFailure
        expr: nexclass_billing_job_last_success_timestamp_seconds == 0 or (time() - nexclass_billing_job_last_success_timestamp_seconds) > 1200
        for: 15m
        labels:
          severity: critical
          service: billing
        annotations:
          summary: "Billing job has not run successfully"
          description: "Billing job failure - automated invoices may not be generated"

      - alert: PaymentProcessingFailures
        expr: rate(nexclass_payment_processing_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: billing
        annotations:
          summary: "Payment processing failures detected"
          description: "Failure rate: {{ $value | humanizePercentage }}"

      # ===== WebSocket/Real-time Alerts =====
      - alert: WebSocketConnectionErrors
        expr: rate(nexclass_websocket_connection_errors_total[5m]) > 1.0
        for: 3m
        labels:
          severity: warning
          service: websocket
        annotations:
          summary: "Real-time WebSocket connection errors"
          description: "Error rate: {{ $value }} connections/sec"

      - alert: HighWebSocketConnections
        expr: nexclass_websocket_active_connections > 1000
        for: 5m
        labels:
          severity: warning
          service: websocket
        annotations:
          summary: "High number of active WebSocket connections"
          description: "Active connections: {{ $value }}"

      # ===== Infrastructure & System Alerts =====
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / (1024*1024*1024) > 0.8
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage: {{ $value | humanize }}GB"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage: {{ $value | humanizePercentage }}"

      # ===== Monitoring System Alerts =====
      - alert: PrometheusStorageFull
        expr: predict_linear(prometheus_tsdb_symbol_table_size_bytes[1h], 24*3600) > 10737418240
        for: 15m
        labels:
          severity: warning
          service: prometheus
        annotations:
          summary: "Prometheus storage running out of space"
          description: "Prometheus storage will be full in 24 hours"

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: "Alertmanager is unavailable"
          description: "Alert notifications may not be sent"

      - alert: JaegerStorageIssues
        expr: rate(jaeger_storage_capacity_dropped_operations_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: jaeger
        annotations:
          summary: "Jaeger is dropping spans"
          description: "Spans dropped at rate: {{ $value }} per second (storage full)"

