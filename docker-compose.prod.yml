version: '3.8'

services:
  # ===== Core Application (Production) =====
  backend:
    image: ${DOCKER_REGISTRY}/nexclass-backend:${IMAGE_TAG:-latest}
    container_name: nexclass-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      ALERT_EMAIL_RECIPIENTS: ${ALERT_EMAIL_RECIPIENTS}
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nexclass
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  frontend:
    image: ${DOCKER_REGISTRY}/nexclass-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: nexclass-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - nexclass
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ===== Observability Stack (Production) =====

  # Prometheus - Lightweight, 1GB RAM
  prometheus:
    image: prom/prometheus:latest
    container_name: nexclass-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.max-block-duration=2h'
      - '--storage.tsdb.min-block-duration=2h'
    networks:
      - nexclass
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Loki - Log aggregation, 512MB RAM
  loki:
    image: grafana/loki:latest
    container_name: nexclass-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - nexclass
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Jaeger - Distributed tracing, 512MB RAM
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexclass-jaeger
    restart: unless-stopped
    ports:
      - '4318:4318'
      - '16686:16686'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
      MEMORY_MAX_TRACES: '3000'
    volumes:
      - jaeger_data:/badger
    networks:
      - nexclass
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Grafana - Dashboards, 256MB RAM
  grafana:
    image: grafana/grafana:latest
    container_name: nexclass-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-https://grafana.yourdomain.com}
      GF_SMTP_ENABLED: 'true'
      GF_SMTP_HOST: ${SMTP_HOST}
      GF_SMTP_PORT: ${SMTP_PORT}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASS}
      # Grafana requires a plain email address here, not "Name <email>".
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_FROM_ADDRESS:-noreply@yourdomain.com}
      GF_SMTP_FROM_NAME: 'NexClass Alerts'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./observability/grafana/provisioning/notifiers:/etc/grafana/provisioning/notifiers
    networks:
      - nexclass
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Alertmanager - Alert routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: nexclass-alertmanager
    restart: unless-stopped
    ports:
      - '9093:9093'
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - nexclass
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  nexclass:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  jaeger_data:
  grafana_data:
  alertmanager_data:
