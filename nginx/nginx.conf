worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ─────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ──────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip            on;
  gzip_types      text/plain text/css application/json application/javascript
                  text/xml application/xml application/xml+rss text/javascript;

  # ── Security: hide nginx version ────────────────────────────────────────────
  server_tokens off;

  # ── Request size limits ──────────────────────────────────────────────────────
  client_max_body_size   20m;   # max upload (profile images, materials)
  client_body_timeout    30s;
  client_header_timeout  10s;
  send_timeout           30s;

  # ── Rate limiting zones ──────────────────────────────────────────────────────
  # General API: 60 req/min per IP
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  # Auth endpoints: 10 req/min per IP  (brute-force protection)
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  # File uploads: 5 req/min per IP
  limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

  limit_req_status 429;

  # ── Connection limits ────────────────────────────────────────────────────────
  # Max 20 simultaneous connections per IP
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
  limit_conn conn_limit 20;

  # ── Upstream services ────────────────────────────────────────────────────────
  upstream backend {
    server backend:4000;
    keepalive 32;
  }

  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # ── Main server ──────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # ── Security headers (applied to all responses) ───────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:;"
      always;

    # ── Block common attack patterns ──────────────────────────────────────────
    # Block requests with suspicious user agents
    if ($http_user_agent ~* "(sqlmap|nikto|nessus|masscan|zgrab|nuclei)") {
      return 403;
    }
    # Block null user agents
    if ($http_user_agent = "") {
      return 403;
    }

    # ── WebSocket proxy (attendance live sessions) ────────────────────────────
    location /ws/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
    }

    # ── Auth routes: strict rate limit ───────────────────────────────────────
    location ~ ^/api/auth/(login|register|refresh|password) {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── File upload routes: upload rate limit ─────────────────────────────────
    location ~ ^/api/(auth/profile/image|materials) {
      limit_req zone=upload burst=3 nodelay;
      client_max_body_size 20m;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── All other API routes: general rate limit ──────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── Frontend (Next.js) ────────────────────────────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────────────────────
    location ~ /\. {
      deny all;
    }
  }
}
