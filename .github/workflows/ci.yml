name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Backend: Lint → Test → Build → Security scan
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint, Test, Build & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci-test-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      DATABASE_URL: postgresql://test:test@localhost:5432/nexclass_test
      UPSTASH_REDIS_REST_URL: https://test.upstash.io
      UPSTASH_REDIS_REST_TOKEN: test-token
      SMTP_HOST: localhost
      SMTP_PORT: "587"
      SMTP_USER: test@test.com
      SMTP_PASS: test-password
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      GROQ_API_KEY: test-key
      FRONTEND_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexclass_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (test DB)
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Security audit (npm)
        run: npm audit --audit-level=high
        continue-on-error: true   # Report but don't block; fix separately

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2. Frontend: Lint → Build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Security audit (npm)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy to Staging  (develop branch only)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/nexclass
            git pull origin develop

            # Rolling update — backend first, then frontend
            docker compose pull backend
            docker compose up -d --no-deps --build backend
            sleep 10
            # Health check
            curl -f http://localhost:4000/api/health || exit 1

            docker compose pull frontend
            docker compose up -d --no-deps --build frontend

            # Prune old images
            docker image prune -f

  # ─────────────────────────────────────────────────────────────
  # 4. Deploy to Production  (main branch only, manual approval)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy — Production
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Run DB migrations (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/nexclass/backend
            DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}" npx prisma migrate deploy

      - name: Blue/Green deploy — backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/nexclass
            git pull origin main

            # Build new image
            docker compose -f docker-compose.prod.yml build backend

            # Start new container alongside existing one
            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            # Wait and health-check (30 s)
            sleep 15
            curl -f http://localhost:4000/api/health || (echo "Health check failed" && exit 1)

            # Build & swap frontend
            docker compose -f docker-compose.prod.yml build frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend

            docker image prune -f
            echo "Production deploy complete"

      - name: Notify on success
        if: success()
        run: |
          echo "::notice title=Deploy Success::Production deploy of ${{ github.sha }} succeeded."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error title=Deploy Failed::Production deploy of ${{ github.sha }} FAILED. Manual rollback may be required."
