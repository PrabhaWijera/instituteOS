version: 2

updates:
  # Backend Node.js dependencies
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Colombo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      # Group minor + patch updates to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Pin Prisma major versions manually (breaking changes need review)
      - dependency-name: prisma
        update-types: [version-update:semver-major]
      - dependency-name: "@prisma/client"
        update-types: [version-update:semver-major]

  # Frontend Node.js dependencies
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Colombo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    labels:
      - dependencies
      - ci
